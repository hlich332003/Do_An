name: cinematick
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cinematick-mssql
    ports:
      - '127.0.0.1:1433:1433'
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourPassword123!
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ['CMD', '/opt/mssql-tools18/bin/sqlcmd', '-S', 'localhost', '-U', 'sa', '-P', 'YourPassword123!', '-Q', 'SELECT 1', '-C']
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  mssql_data:
    driver: local
