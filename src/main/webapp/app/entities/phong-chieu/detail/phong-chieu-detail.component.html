<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (phongChieu(); as phongChieuRef) {
      <div>
        <h2 data-cy="phongChieuDetailsHeading"><span>Phòng Chiếu</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span>ID</span></dt>
          <dd>
            <span>{{ phongChieuRef.id }}</span>
          </dd>
          <dt><span>Tên Phòng</span></dt>
          <dd>
            <span>{{ phongChieuRef.tenPhong }}</span>
          </dd>
          <dt><span>Số Lượng Ghế</span></dt>
          <dd>
            <span>{{ phongChieuRef.soLuongGhe }}</span>
          </dd>
          <dt><span>Trạng Thái</span></dt>
          <dd>
            <span>{{ getRoomStatusLabel(phongChieuRef.trangThai) }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span> Quay lại </span>
        </button>

        <button type="button" [routerLink]="['/admin/phong-chieu', phongChieuRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span> Sửa </span>
        </button>
      </div>
    }
  </div>
</div>
