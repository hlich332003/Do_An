<div class="seat-map-container">
  <div *ngIf="isLoading" class="text-center py-3">
    <div class="spinner-border spinner-border-sm"></div>
    <span class="ms-2">Đang tải sơ đồ ghế...</span>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <div class="screen">
    <span>Màn hình</span>
  </div>

  <div class="seats">
    <div *ngFor="let row of seatRows" class="seat-row">
      <div class="row-label text-muted fw-semibold">{{ row[0]?.primarySeat?.hang ?? '' }}</div>
      <div class="seat-row-seats">
        <button
          type="button"
          class="seat"
          *ngFor="let group of row"
          [ngClass]="{
            'ghe-trong': group.state === 'TRONG',
            'ghe-da-ban': group.state === 'DA_BAN',
            'ghe-dang-giu': group.state === 'DANG_GIU',
            'ghe-dang-chon': group.state === 'DANG_CHON',
            'ghe-vip': group.primarySeat.loaiGhe === 2,
            'ghe-doi': group.isCouple,
          }"
          [title]="getDisplayLabel(group)"
          (click)="toggleSeat(group)"
        >
          <ng-container *ngIf="group.isCouple && group.seats.length === 2; else singleSeat">
            <span class="seat-label seat-label-couple">{{ getDisplayNumber(group) }}</span>
          </ng-container>
          <ng-template #singleSeat>
            <span class="seat-label">{{ group.primarySeat.maGhe }}</span>
          </ng-template>
        </button>
      </div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="seat ghe-da-ban"><span class="seat-label"></span></div>
      <span>Đã đặt</span>
    </div>
    <div class="legend-item">
      <div class="seat ghe-dang-chon"><span class="seat-label"></span></div>
      <span>Đang chọn</span>
    </div>
    <div class="legend-item">
      <div class="seat ghe-dang-giu"><span class="seat-label"></span></div>
      <span>Đang giữ</span>
    </div>
    <div class="legend-item">
      <div class="seat ghe-trong"><span class="seat-label"></span></div>
      <span>Ghế thường</span>
    </div>
    <div class="legend-item">
      <div class="seat ghe-vip"><span class="seat-label"></span></div>
      <span>Ghế VIP</span>
    </div>
    <div class="legend-item">
      <div class="seat ghe-doi"><span class="seat-label seat-label-couple">1-2</span></div>
      <span>Ghế đôi</span>
    </div>
  </div>
</div>
