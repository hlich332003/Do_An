@if (phim) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(phim.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="phimDeleteDialogHeading">Xác nhận thao tác xóa</h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p id="jhi-delete-phim-heading">Bạn có chắc chắn muốn xóa Phim {{ phim.id }}?</p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban"></fa-icon>&nbsp;<span> Hủy </span>
      </button>

      <button id="jhi-confirm-delete-phim" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times"></fa-icon>&nbsp;<span> Xóa </span>
      </button>
    </div>
  </form>
}
