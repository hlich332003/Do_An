<div class="movie-list-page">
  <div class="page-hero rounded-4 shadow-sm px-4 py-3 mb-4">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
      <div>
        <p class="section-kicker mb-1">Kho nội dung</p>
        <h2 id="page-heading" data-cy="PhimHeading" class="mb-0 page-title">Danh sách phim</h2>
      </div>

      <button class="btn btn-outline-secondary btn-sm rounded-pill" type="button" (click)="loadPhims()" [disabled]="isLoading">
        <fa-icon icon="sync" [animation]="isLoading ? 'spin' : undefined"></fa-icon>
        <span class="ms-1">Làm mới</span>
      </button>
    </div>

    <div class="row g-2 align-items-end mt-3">
      <div class="col-12 col-md-6 col-lg-5">
        <label class="form-label small fw-semibold text-uppercase text-muted mb-1" for="publicPhimSearch">Từ khóa</label>
        <div class="input-group input-group-sm simple-search-group">
          <span class="input-group-text bg-white"><fa-icon icon="search"></fa-icon></span>
          <input
            id="publicPhimSearch"
            type="text"
            class="form-control"
            placeholder="Tìm theo tên, thể loại, đạo diễn, diễn viên..."
            [(ngModel)]="searchTerm"
            (input)="onSearchInput($event)"
            (keyup.enter)="onSearch()"
          />
        </div>
      </div>
      <div class="col-12 col-md-4 col-lg-3">
        <label class="form-label small fw-semibold text-uppercase text-muted mb-1" for="publicPhimGenre">Thể loại</label>
        <select id="publicPhimGenre" class="form-select form-select-sm" [(ngModel)]="selectedGenre" (change)="onSearch()">
          <option value="">Tất cả thể loại</option>
          <option *ngFor="let genre of genres" [value]="genre">{{ genre }}</option>
        </select>
      </div>
      <div class="col-auto">
        <button class="btn btn-primary btn-sm" type="button" (click)="onSearch()">Tìm</button>
        <button
          class="btn btn-outline-secondary btn-sm ms-1"
          type="button"
          (click)="clearSearch()"
          [disabled]="!searchTerm.trim() && !selectedGenre"
        >
          Xóa
        </button>
      </div>
    </div>
  </div>

  <jhi-alert-error />
  <jhi-alert />

  <div *ngIf="isLoading" class="d-flex justify-content-center py-5">
    <div class="spinner-border text-danger" role="status">
      <span class="visually-hidden">Đang tải...</span>
    </div>
  </div>

  <div *ngIf="!isLoading && phims.length === 0" class="alert alert-warning rounded-4 shadow-sm">
    <span>Chưa tìm thấy phim nào.</span>
  </div>

  <div *ngIf="!isLoading && phims.length > 0" class="container-fluid px-0">
    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-6 g-3 g-xl-4">
      <div class="col" *ngFor="let phim of phims; trackBy: trackId">
        <div class="movie-card shadow-sm h-100 border-0 rounded-3 overflow-hidden position-relative">
          <div class="position-relative">
            <a [routerLink]="['/phim-chi-tiet', phim.id]">
              <img
                [src]="phim.poster?.trim() || 'content/images/no-product-image.png'"
                class="w-100 movie-poster"
                [alt]="phim.tenPhim"
                loading="eager"
                decoding="async"
              />
            </a>

            <div class="position-absolute top-0 start-0 m-2 d-flex flex-wrap gap-1">
              <span class="badge bg-danger rounded-1">2D</span>
              <span class="badge bg-warning text-dark rounded-1 fw-bold">{{ getAgeRating(phim) }}</span>
            </div>
          </div>

          <div class="card-body p-3 bg-white text-center">
            <h5 class="card-title movie-name fw-bold mb-1" [title]="phim.tenPhim">
              <a [routerLink]="['/phim-chi-tiet', phim.id]" class="text-dark text-decoration-none">{{ phim.tenPhim }}</a>
            </h5>
            <p class="card-text text-muted movie-meta mb-2">
              <fa-icon icon="tags" class="me-1"></fa-icon>
              {{ formatGenre(phim.theLoai) || 'N/A' }}
            </p>
            <p class="card-text text-muted movie-meta mb-2">
              <fa-icon icon="clock" class="me-1"></fa-icon>
              {{ phim.thoiLuong || 'N/A' }} phút
            </p>
            <p class="card-text text-muted movie-meta mb-0">
              <fa-icon icon="calendar-alt" class="me-1"></fa-icon>
              {{ phim.ngayKhoiChieu | formatMediumDate }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
