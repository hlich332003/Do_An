# Redis – Cache, Distributed Lock, JWT Blacklist
name: cinematick
services:
  redis:
    image: redis:7.2-alpine
    container_name: cinematick-redis
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
